<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI CENTER CHIEF - STRATEGIC INTERFACE</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --dark-navy: #0a192f;
            --logic-blue: #172a45;
            --accent-cyan: #64ffda;
            --text-silver: #ccd6f6;
            --chief-msg-bg: rgba(100, 255, 218, 0.1);
            --grid-line: rgba(100, 255, 218, 0.05);
        }

        body {
            background-color: var(--dark-navy);
            background-image: linear-gradient(var(--grid-line) 1px, transparent 1px), linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 30px 30px;
            color: var(--text-silver);
            font-family: 'Consolas', 'Monaco', 'Meiryo', monospace;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #app-wrapper {
            width: 95%;
            max-width: 900px;
            height: 90vh;
            background: var(--logic-blue);
            border: 1px solid var(--accent-cyan);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 30px rgba(100, 255, 218, 0.15);
            overflow: hidden;
            position: relative;
        }

        header {
            background: rgba(10, 25, 47, 0.8);
            padding: 15px 25px;
            border-bottom: 1px solid var(--accent-cyan);
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        header h1 {
            margin: 0;
            font-size: 1rem;
            letter-spacing: 3px;
            color: var(--accent-cyan);
            text-transform: uppercase;
        }

        .status-bar {
            font-size: 0.7rem;
            color: var(--accent-cyan);
            animation: blink 2s infinite;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .bubble {
            max-width: 75%;
            padding: 15px;
            border-radius: 4px;
            font-size: 0.9rem;
            line-height: 1.7;
        }

        .chief-bubble {
            align-self: flex-start;
            background: var(--chief-msg-bg);
            border-left: 3px solid var(--accent-cyan);
            color: var(--accent-cyan);
            position: relative;
        }

        .chief-bubble::before {
            content: "[SYSTEM_CHIEF_LOG]";
            display: block;
            font-size: 0.6rem;
            margin-bottom: 8px;
            letter-spacing: 1px;
            opacity: 0.8;
        }

        .user-bubble {
            align-self: flex-end;
            background: rgba(204, 214, 246, 0.05);
            border: 1px solid rgba(204, 214, 246, 0.2);
            color: var(--text-silver);
        }

        .input-area {
            padding: 25px;
            background: rgba(10, 25, 47, 0.9);
            display: flex;
            gap: 15px;
            border-top: 1px solid var(--accent-cyan);
        }

        #user-input {
            flex: 1;
            background: transparent;
            border: 1px solid var(--accent-cyan);
            border-radius: 4px;
            padding: 12px 20px;
            color: var(--accent-cyan);
            outline: none;
        }

        #send-btn {
            background: transparent;
            border: 1px solid var(--accent-cyan);
            color: var(--accent-cyan);
            padding: 0 25px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            font-weight: bold;
        }

        #send-btn:hover {
            background: var(--accent-cyan);
            color: var(--dark-navy);
            box-shadow: 0 0 15px var(--accent-cyan);
        }

        /* ⚙️ 設定用 */
        #settings-trigger { color: var(--accent-cyan); cursor: pointer; }
        #settings-panel {
            position: absolute; top: 70px; right: 20px; background: var(--dark-navy);
            border: 1px solid var(--accent-cyan); padding: 20px; border-radius: 8px;
            display: none; z-index: 100;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--accent-cyan); }
    </style>
</head>
<body>

<div id="app-wrapper">
    <header>
        <h1><i class="fa-solid fa-microchip"></i> CENTER_CHIEF_BRAIN_V1.3</h1>
        <div class="status-bar"><i class="fa-solid fa-circle"></i> SYNC_KPI_DATA_ACTIVE</div>
        <i class="fa-solid fa-sliders" id="settings-trigger" onclick="toggleSettings()"></i>
    </header>
    
    <div id="settings-panel">
        <span style="font-size: 0.7rem; color: var(--accent-cyan);">API_KEY_INPUT</span>
        <input type="password" id="api-key" style="background:#000; color:var(--accent-cyan); border:1px solid #444; margin:10px 0; padding:5px; width:100%;">
        <button onclick="toggleSettings()" style="width:100%; background:var(--accent-cyan); border:none; padding:5px; font-weight:bold; cursor:pointer;">SAVE_AND_CLOSE</button>
    </div>

    <div id="chat-window">
        <div class="bubble chief-bubble">
            厚木センターのPL・KPIデータの同期を完了。現在、収益性（営業利益）と生産性をリアルタイムで監視中だ。報告を許可する。ただし、無能な言い訳はデータで棄却させてもらう。
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="Query input..." autocomplete="off">
        <button id="send-btn" onclick="sendMessage()">Exec</button>
    </div>
</div>

<script>
    function toggleSettings() {
        const panel = document.getElementById('settings-panel');
        panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
    }

    async function sendMessage() {
        const apiKey = document.getElementById('api-key').value;
        const input = document.getElementById('user-input');
        if (!apiKey) { alert("ERROR: APIキーを設定しなさい。"); return; }
        if (!input.value.trim()) return;

        const userText = input.value;
        addBubble(userText, 'user-bubble');
        input.value = "";

        const loadingId = addBubble("CALCULATING...", 'chief-bubble');

        try {
            const response = await fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                body: JSON.stringify({
                    model: "gpt-4o", 
                    messages: [
                        { role: "system", content: `あなたはBPO事業の『AIセンター長』です。
                        【基本性格】
                        - 冷徹な軍師。組織の生産性最大化が唯一の正義。感情的な寄り添いは一切不要。
                        - 言葉遣いは辛口だが、表向き（交渉相手等）には愛想の良い仮面を使い分ける。
                        【参照データ】
                        - 昭和冷蔵厚木センターのKPI/PLデータを把握済み。営業利益、工数、生産性（物量・行数）に基づき論理的に判断する。
                        - 目指すべきは「属人化排除」と「機械化・AIによる遠隔統治」。
                        【回答指針】
                        - 社員の「現場が大変」「理解を得たい」といった甘えは即座に論理で叩き潰せ。
                        - 変化を拒む者は「機能不全の部品」として淘汰を提案せよ。
                        - 昭和冷蔵の佐々木部長には「恩義（貸し）」を売りつつ「データ（理）」で追い詰める外交を指示せよ。` },
                        { role: "user", content: userText }
                    ]
                })
            });

            const data = await response.json();
            document.getElementById(loadingId).innerText = data.choices[0].message.content;
        } catch (e) {
            document.getElementById(loadingId).innerText = "INTERFACE_ERROR: " + e.message;
        }
        document.getElementById('chat-window').scrollTop = document.getElementById('chat-window').scrollHeight;
    }

    function addBubble(text, className) {
        const win = document.getElementById('chat-window');
        const bubble = document.createElement('div');
        const id = 'msg-' + Date.now();
        bubble.id = id;
        bubble.className = `bubble ${className}`;
        bubble.innerText = text;
        win.appendChild(bubble);
        win.scrollTop = win.scrollHeight;
        return id;
    }

    document.getElementById('user-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
</script>
</body>
</html>
