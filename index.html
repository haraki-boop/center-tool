<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>裏荒木OS</title>
    <style>
        :root { --primary: #1a237e; --accent: #ff1744; --bg: #f0f2f5; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; display: flex; height: 100dvh; flex-direction: column; overflow: hidden; }
        header { background: var(--primary); color: white; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        #settings-btn { background: none; border: 1px solid white; color: white; border-radius: 4px; padding: 2px 8px; font-size: 0.7rem; cursor: pointer; }
        #chat-window { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 85%; padding: 12px; border-radius: 15px; font-size: 0.9rem; line-height: 1.5; white-space: pre-wrap; }
        .ai { align-self: flex-start; background: white; border-left: 4px solid var(--accent); }
        .user { align-self: flex-end; background: var(--primary); color: white; }
        #input-panel { background: white; padding: 10px; display: flex; gap: 5px; border-top: 1px solid #ddd; }
        input { flex-grow: 1; padding: 10px; border: 1px solid #ccc; border-radius: 20px; outline: none; }
        button#sendBtn { background: var(--primary); color: white; border: none; padding: 0 15px; border-radius: 20px; font-weight: bold; }
        .loss { color: #ffab00; font-weight: bold; font-size: 0.7rem; text-align: right; }
    </style>
</head>
<body>

<header>
    <div><strong>裏荒木OS</strong></div>
    <div style="text-align: right;">
        <div class="loss">損失 ¥2,814,000</div>
        <button id="settings-btn" onclick="setKey()">KEY設定</button>
    </div>
</header>

<div id="chat-window">
    <div class="msg ai">最新データを同期中...</div>
</div>

<div id="input-panel">
    <input type="text" id="userInput" placeholder="報告..." autocomplete="off">
    <button id="sendBtn" onclick="callAI()">執行</button>
</div>

<script>
    let API_KEY = localStorage.getItem('MY_OPENAI_KEY');
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRbegZyPNz_DC8cQXxGmWEgxywH8MKptmSIG0TK315W7G17yZwh-M1lmiJFRbIbH-N2zwYmw62iSHxH/pub?output=csv';
    let LIVE_DATA = "";

    if (!API_KEY) setKey();

    function setKey() {
        const key = prompt("OpenAI APIキー(sk-...)を入力せよ");
        if (key) { localStorage.setItem('MY_OPENAI_KEY', key); API_KEY = key; location.reload(); }
    }

    async function syncData() {
        try {
            const res = await fetch(CSV_URL);
            LIVE_DATA = await res.text();
            document.querySelector('.ai').innerText = "KPI同期完了。報告を始めろ。";
        } catch (e) { document.querySelector('.ai').innerText = "同期失敗。だが執行は可能だ。"; }
    }
    syncData();

    async function callAI() {
        if (!API_KEY) { setKey(); return; }
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if (!text) return;

        addMsg(text, 'user');
        input.value = "";
        const loading = addMsg("思考中...", 'ai');

        // ★魔法の1行：プロキシを頭に付けることで「Failed to fetch」を粉砕する
        const proxy = "https://corsproxy.io/?";
        const target = "https://api.openai.com/v1/chat/completions";

        try {
            const response = await fetch(proxy + encodeURIComponent(target), {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${API_KEY}`
                },
                body: JSON.stringify({
                    model: "gpt-4o",
                    messages: [
                        { role: "system", content: "あなたはAIセンター長（裏荒木）です。最新KPI：" + LIVE_DATA + "\n常に【ガワ】と【中身】を提示しろ。損失281万円を止めることが正義だ。" },
                        { role: "user", content: text }
                    ]
                })
            });

            const data = await response.json();
            loading.remove();
            addMsg(data.choices[0].message.content, 'ai');
        } catch (e) {
            loading.innerText = "執行拒絶。キーが正しいか、残高があるか確認しろ。";
        }
    }

    function addMsg(text, side) {
        const win = document.getElementById('chat-window');
        const div = document.createElement('div');
        div.className = `msg ${side}`;
        div.innerText = text;
        win.appendChild(div);
        win.scrollTop = win.scrollHeight;
        return div;
    }
    document.getElementById('userInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') callAI(); });
</script>
</body>
</html>
