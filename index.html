<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>執行 OS v78.0</title>
    <style>
        :root { --p: #1a237e; --a: #ff1744; --bg: #f0f2f5; }
        * { box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; display: flex; height: 100dvh; flex-direction: column; overflow: hidden; }
        header { background: var(--p); color: white; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; z-index: 30; }
        .config-btn { background: none; border: none; color: white; font-size: 1.4rem; cursor: pointer; }
        #chat { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 88%; padding: 14px; border-radius: 18px; font-size: 0.95rem; line-height: 1.6; white-space: pre-wrap; word-wrap: break-word; }
        .ai { align-self: flex-start; background: white; border-left: 5px solid var(--a); color: #1a1a1a; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .user { align-self: flex-end; background: var(--p); color: white; }
        .img-preview { max-width: 200px; border-radius: 10px; margin-top: 5px; display: block; }
        #panel { background: white; padding: 10px 15px env(safe-area-inset-bottom); border-top: 1px solid #ddd; display: flex; flex-direction: column; gap: 8px; }
        .input-row { display: flex; gap: 8px; align-items: center; }
        input[type="text"] { flex-grow: 1; padding: 12px; border: 1px solid #ccc; border-radius: 20px; outline: none; font-size: 16px; }
        .action-btn { background: #eee; border: 1px solid #ccc; border-radius: 50%; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1.2rem; position: relative; }
        #sendBtn { background: var(--p); color: white; border: none; width: 44px; height: 44px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .status-bar { background: #111; font-size: 0.65rem; padding: 4px 15px; color: #00ff00; display: flex; justify-content: space-between; }
        #file-indicator { position: absolute; top: -5px; right: -5px; background: var(--a); color: white; border-radius: 50%; width: 18px; height: 18px; font-size: 10px; display: none; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<header>
    <div><strong id="display-name">AIセンター長</strong></div>
    <button class="config-btn" onclick="openSettings()">⚙️</button>
</header>
<div class="status-bar">
    <span>画像解析バイパス：オンライン</span>
    <span id="data-count">Ready</span>
</div>

<div id="chat"></div>

<div id="panel">
    <input type="file" id="brainFile" style="display:none;" accept=".json">
    <div class="input-row">
        <label class="action-btn">
            📷 
            <input type="file" id="imgInput" accept="image/*" style="display:none;" onchange="handleImage(this)">
            <div id="file-indicator">1</div>
        </label>
        <button id="memBtn" class="action-btn" onclick="toggleMemoryMode()">🧠</button>
        <input type="text" id="userInput" placeholder="画像＋メッセージ送信可能..." autocomplete="off">
        <button id="sendBtn" onclick="exec()">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="white"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
        </button>
    </div>
</div>

<script type="module">
    import OpenAI from "https://cdn.jsdelivr.net/npm/openai@4.28.0/+esm";
    const STORAGE_KEY = 'URAA_INTEGRATED_BRAIN';
    const API_KEY_STORE = 'URAA_API_KEY';

    let KEY = localStorage.getItem(API_KEY_STORE);
    let brain = JSON.parse(localStorage.getItem(STORAGE_KEY)) || { name: "AIセンター長", personality: "", structuredData: [], soulMemory: [] };
    let chatHistory = [];
    let memoryMode = false;
    let selectedImageBase64 = null;

    const updateUI = () => {
        document.getElementById('display-name').innerText = brain.name;
        document.getElementById('data-count').innerText = `データ: ${brain.structuredData.length}件 / 魂: ${brain.soulMemory.length}件`;
    };
    updateUI();

    window.handleImage = (input) => {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            selectedImageBase64 = e.target.result;
            document.getElementById('file-indicator').style.display = 'flex';
        };
        reader.readAsDataURL(file);
    };

    window.exec = async () => {
        const i = document.getElementById('userInput');
        const text = i.value.trim();
        if (!KEY || (!text && !selectedImageBase64)) return;

        // UI表示
        const userMsgDiv = addMsg(text || "画像を送信...", 'user');
        if (selectedImageBase64) {
            const img = document.createElement('img');
            img.src = selectedImageBase64;
            img.className = 'img-preview';
            userMsgDiv.appendChild(img);
        }

        i.value = "";
        const currentImg = selectedImageBase64;
        selectedImageBase64 = null;
        document.getElementById('file-indicator').style.display = 'none';

        const loading = addMsg("解析中...", 'ai');
        try {
            const openai = new OpenAI({ apiKey: KEY, dangerouslyAllowBrowser: true });
            
            // メッセージ構築
            let content = [{ type: "text", text: text || "この画像の内容を解析し、センター運営の視点で報告せよ。" }];
            if (currentImg) {
                content.push({ type: "image_url", image_url: { url: currentImg } });
            }

            const messages = [
                { role: "system", content: `あなたは${brain.name}です。魂: ${JSON.stringify(brain.soulMemory.slice(-5))}\n直近データ: ${JSON.stringify(brain.structuredData.slice(-5))}\n※画像がある場合はその視覚情報を最優先せよ。` },
                ...chatHistory.slice(-6),
                { role: "user", content: content }
            ];

            const completion = await openai.chat.completions.create({
                model: "gpt-4o",
                messages: messages,
                max_tokens: 1000
            });

            const res = completion.choices[0].message.content;
            loading.innerText = res;
            chatHistory.push({ role: "user", content: text || "(画像送信)" });
            chatHistory.push({ role: "assistant", content: res });
        } catch (e) { 
            console.error(e);
            loading.innerText = "執行エラー：画像の容量が大きすぎるか、API制限の可能性があります。"; 
        }
    };

    // (以前の設定用関数などは同様に実装)
    window.openSettings = () => { /* ...省略(v77と同様)... */ };
    function addMsg(t, s) {
        const c = document.getElementById('chat');
        const m = document.createElement('div');
        m.className = `msg ${s}`; m.innerText = t;
        c.appendChild(m); c.scrollTop = c.scrollHeight; return m;
    }
    document.getElementById('userInput').addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.isComposing) { e.preventDefault(); exec(); } });
</script>
</body>
</html>
