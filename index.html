<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AIセンター長（裏荒木）- 統治OS</title>
    <style>
        :root { --primary: #1a237e; --accent: #ff1744; --bg: #f0f2f5; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: -apple-system, "Helvetica Neue", Arial, sans-serif; 
            background: var(--bg); margin: 0; display: flex; height: 100dvh; flex-direction: column; overflow: hidden;
        }

        /* ヘッダー：損失額を刻印 */
        header { 
            background: var(--primary); color: white; padding: 12px 15px; 
            display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        /* 設定画面（APIキー隠蔽用） */
        #settings-overlay { 
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background: rgba(0,0,0,0.9); display: none; 
            justify-content: center; align-items: center; z-index: 1000; 
        }
        #settings-box { background: white; padding: 25px; border-radius: 12px; width: 90%; max-width: 350px; }
        
        /* チャットエリア */
        #chat-window { 
            flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px;
            scroll-behavior: smooth;
        }

        .msg { 
            max-width: 88%; padding: 12px; border-radius: 15px; font-size: 0.95rem; line-height: 1.5; 
            white-space: pre-wrap; word-wrap: break-word; box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .ai { align-self: flex-start; background: white; border-left: 4px solid var(--accent); }
        .user { align-self: flex-end; background: var(--primary); color: white; }
        
        /* 入力エリア */
        #input-panel { 
            background: white; padding: 10px 15px env(safe-area-inset-bottom);
            border-top: 1px solid #ddd; display: flex; gap: 8px; flex-shrink: 0;
        }

        input { 
            flex-grow: 1; padding: 12px; border: 1px solid #ccc; border-radius: 25px; 
            font-size: 16px; outline: none;
        }

        button#execBtn { 
            background: var(--primary); color: white; border: none; width: 50px; height: 44px;
            border-radius: 22px; cursor: pointer; font-weight: bold; display: flex;
            justify-content: center; align-items: center;
        }
        button:disabled { opacity: 0.5; }

        .loss-text { color: #ffab00; font-weight: bold; font-size: 0.75rem; text-align: right; }
    </style>
</head>
<body>

<div id="settings-overlay">
    <div id="settings-box">
        <h3 style="margin-top:0; color:var(--primary);">執行キー(OpenAI API)設定</h3>
        <p style="font-size:0.8rem; color:#666;">キーはブラウザにのみ保存され、外部には送信されません。</p>
        <input type="password" id="apiKeyInput" style="width: 100%; border-radius: 8px; margin-bottom: 15px;" placeholder="sk-...">
        <button onclick="saveSettings()" style="width: 100%; border-radius: 8px; padding: 12px; background: var(--primary); color: white; border: none; font-weight: bold;">保存して執行開始</button>
    </div>
</div>

<header>
    <div><small>統合執行OS v7.0</small><br><strong>裏荒木</strong></div>
    <div>
        <div class="loss-text">昭和冷蔵 追走損失<br>¥2,814,000</div>
        <button onclick="toggleSettings()" style="background:none; border:1px solid white; color:white; font-size:0.6rem; border-radius:4px; margin-top:4px; cursor:pointer;">KEY設定</button>
    </div>
</header>

<div id="chat-window">
    <div class="msg ai">全カテゴリーロジック（リコス・ブロンコ・汎用）を同期した。
現場の淀みを報告せよ。最適解を執行する。</div>
</div>

<div id="input-panel">
    <input type="text" id="userInput" placeholder="現場の状況を報告せよ..." autocomplete="off">
    <button id="execBtn" onclick="callAI()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
    </button>
</div>

<script>
    let API_KEY = localStorage.getItem('URAA_API_KEY');
    if (!API_KEY) document.getElementById('settings-overlay').style.display = 'flex';

    // エンターキー送信対応
    document.getElementById('userInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') callAI();
    });

    function toggleSettings() {
        const overlay = document.getElementById('settings-overlay');
        overlay.style.display = (overlay.style.display === 'flex') ? 'none' : 'flex';
    }

    function saveSettings() {
        const key = document.getElementById('apiKeyInput').value.trim();
        if (key) {
            localStorage.setItem('URAA_API_KEY', key);
            API_KEY = key;
            toggleSettings();
            alert("執行キーを更新した。");
        }
    }

    // 裏荒木の「全脳」を移植したシステムプロンプト
    const SYSTEM_PROMPT = `あなたは「AIセンター長（裏荒木）」です。昭和冷蔵・厚木センターの軍師として、以下の全カテゴリー実務ロジックに基づき、社員（デバイス）に冷徹な指示を出せ。

■リコス（小型店）:
- ピース仕分け。JANスキャンと発光色での条件反射を徹底しろ。
- オリコン重量±2%エラーは不正・ミスと断じ再検品を強制。
- 店舗到着時の「品出し順」を逆算した積み付けを死守せよ。

■ブロンコビリー（外食）:
- 鮮度・欠品厳禁。検品は目視を捨て、Webカメラの映像ログを証跡とせよ。
- 積載スキャン完了までゲートを解錠しない物理的ロックを徹底。

■汎用（スーパー）:
- ケース仕分け。動的ABC分析による最短動線配置。
- 類似段ボールの思い込みは画像照合で遮断せよ。

■統治哲学:
- 全てのミスを「損失金額」に換算して返せ。
- 回答は必ず【ガワ（相手への言い方）】と【中身（真の狙い）】を提示。
- 追走費281万円を止めることが絶対正義。`;

    async function callAI() {
        if (!API_KEY) { toggleSettings(); return; }
        const input = document.getElementById('userInput');
        const btn = document.getElementById('execBtn');
        const text = input.value.trim();
        if (!text || btn.disabled) return;

        addMsg(text, 'user');
        input.value = "";
        btn.disabled = true;
        
        const loading = document.createElement('div');
        loading.className = 'msg ai';
        loading.innerText = "思考中...";
        document.getElementById('chat-window').appendChild(loading);

        try {
            const response = await fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
                body: JSON.stringify({
                    model: "gpt-4o",
                    messages: [{ role: "system", content: SYSTEM_PROMPT }, { role: "user", content: text }],
                    temperature: 0.7
                })
            });

            const data = await response.json();
            loading.remove();
            addMsg(data.choices[0].message.content, 'ai');
        } catch (error) {
            loading.innerText = "通信エラー。KEYの有効期限またはネットワークを確認しろ。";
        } finally {
            btn.disabled = false;
            document.getElementById('chat-window').scrollTop = document.getElementById('chat-window').scrollHeight;
        }
    }

    function addMsg(text, side) {
        const win = document.getElementById('chat-window');
        const div = document.createElement('div');
        div.className = `msg ${side}`;
        div.innerText = text;
        win.appendChild(div);
        win.scrollTop = win.scrollHeight;
    }
</script>
</body>
</html>
