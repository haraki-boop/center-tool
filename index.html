<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI CENTER CHIEF - BRAIN INTERFACE</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --panel-color: #1a1a1a;
            --accent-color: #00ff41; /* 軍師の正義：生産性の緑 */
            --text-color: #e0e0e0;
            --border-glow: 0 0 10px rgba(0, 255, 65, 0.2);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #app-container {
            width: 90%;
            max-width: 800px;
            height: 90vh;
            background: var(--panel-color);
            border: 1px solid #333;
            box-shadow: var(--border-glow);
            display: flex;
            flex-direction: column;
            border-radius: 4px;
        }

        header {
            padding: 20px;
            border-bottom: 1px solid #333;
            background: #111;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            margin: 0;
            font-size: 1.2rem;
            letter-spacing: 2px;
            color: var(--accent-color);
            text-transform: uppercase;
        }

        #status-indicator {
            font-size: 0.8rem;
            color: var(--accent-color);
        }

        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: linear-gradient(180deg, #151515 0%, #1a1a1a 100%);
        }

        .message {
            margin-bottom: 20px;
            max-width: 85%;
            line-height: 1.6;
        }

        .chief-msg {
            color: var(--accent-color);
            border-left: 2px solid var(--accent-color);
            padding-left: 15px;
        }

        .chief-msg::before {
            content: "CHIEF > ";
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
            font-size: 0.7rem;
        }

        .user-input-area {
            padding: 20px;
            background: #111;
            border-top: 1px solid #333;
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            background: #000;
            border: 1px solid #444;
            color: var(--accent-color);
            padding: 12px;
            outline: none;
            font-family: monospace;
        }

        button {
            background: var(--accent-color);
            color: #000;
            border: none;
            padding: 0 20px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        button:hover {
            background: #00cc33;
            box-shadow: 0 0 15px var(--accent-color);
        }

        /* スクロールバーのカスタマイズ */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #333; }
    </style>
</head>
<body>

<div id="app-container">
    <header>
        <h1>AI Center Chief Brain v1.0</h1>
        <div id="status-indicator">● ONLINE | Logic Only</div>
    </header>

    <div id="chat-window">
        <div class="message chief-msg">
            待機していた。報告しろ。現場の「感情」は切り捨て、論理的な変数のみを入力せよ。
        </div>
    </div>

    <div class="user-input-area">
        <input type="text" id="user-input" placeholder="Query to Brain..." autocomplete="off">
        <button onclick="sendMessage()">Execute</button>
    </div>
</div>

<script>
    function sendMessage() {
        const input = document.getElementById('user-input');
        const chatWindow = document.getElementById('chat-window');
        
        if (input.value.trim() === "") return;

        // 本来はここにNotebookLMやAPIとの連携ロジックを配備する
        const userMsg = document.createElement('div');
        userMsg.className = 'message';
        userMsg.style.textAlign = 'right';
        userMsg.style.marginLeft = 'auto';
        userMsg.innerHTML = `<span style="color:#888; font-size:0.7rem; display:block;">STAFF ></span>${input.value}`;
        chatWindow.appendChild(userMsg);

        input.value = "";
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    // Enterキーでも送信可能にする
    document.getElementById('user-input').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            sendMessage();
        }
    });
</script>

</body>
</html>
