<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AIセンター長（裏荒木）- 統治OS</title>
    <style>
        /* スタイルは継承（モバイル最適化済み） */
        :root { --primary: #1a237e; --accent: #ff1744; --bg: #f0f2f5; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; display: flex; height: 100dvh; flex-direction: column; overflow: hidden; }
        header { background: var(--primary); color: white; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
        #settings-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 1000; }
        #settings-box { background: white; padding: 25px; border-radius: 12px; width: 90%; max-width: 380px; }
        #chat-window { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 88%; padding: 14px; border-radius: 18px; font-size: 0.95rem; line-height: 1.6; white-space: pre-wrap; word-wrap: break-word; }
        .ai { align-self: flex-start; background: white; border-left: 5px solid var(--accent); }
        .user { align-self: flex-end; background: var(--primary); color: white; }
        #input-panel { background: white; padding: 10px 15px env(safe-area-inset-bottom); border-top: 1px solid #ddd; display: flex; gap: 8px; }
        input { flex-grow: 1; padding: 12px; border: 1px solid #ccc; border-radius: 25px; font-size: 16px; outline: none; }
        button#execBtn { background: var(--primary); color: white; border: none; width: 50px; height: 46px; border-radius: 23px; cursor: pointer; display: flex; justify-content: center; align-items: center; }
        .loss-text { color: #ffab00; font-weight: bold; font-size: 0.75rem; text-align: right; }
    </style>
</head>
<body>

<div id="settings-overlay">
    <div id="settings-box">
        <h3 style="margin-top:0;">執行キー(Gemini)設定</h3>
        <input type="password" id="apiKeyInput" style="width: 100%; border-radius: 8px; margin-bottom: 20px; padding:12px;" placeholder="AIzaSy...">
        <button onclick="saveSettings()" style="width: 100%; border-radius: 8px; padding: 12px; background: var(--primary); color: white; border: none; font-weight: bold;">保存して起動</button>
    </div>
</div>

<header>
    <div><small>統治OS v9.6</small><br><strong>裏荒木</strong></div>
    <div>
        <div class="loss-text">KPI同期完了</div>
        <button onclick="toggleSettings()" style="background:none; border:1px solid white; color:white; font-size:0.6rem; border-radius:4px; margin-top:4px; cursor:pointer;">KEY変更</button>
    </div>
</header>

<div id="chat-window">
    <div class="msg ai" id="welcome-msg">数値を読み込み中...</div>
</div>

<div id="input-panel">
    <input type="text" id="userInput" placeholder="報告せよ..." autocomplete="off">
    <button id="execBtn" onclick="callGemini()">執行</button>
</div>

<script>
    let API_KEY = localStorage.getItem('GEMINI_API_KEY');
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRbegZyPNz_DC8cQXxGmWEgxywH8MKptmSIG0TK315W7G17yZwh-M1lmiJFRbIbH-N2zwYmw62iSHxH/pub?output=csv';
    let LIVE_DATA = "数値データ未取得";

    if (!API_KEY) document.getElementById('settings-overlay').style.display = 'flex';

    async function syncData() {
        try {
            const res = await fetch(CSV_URL);
            LIVE_DATA = await res.text();
            document.getElementById('welcome-msg').innerText = "KPI数値を捕捉。報告を始めろ。";
        } catch (e) {
            document.getElementById('welcome-msg').innerText = "数値同期エラー。だが執行は可能だ。";
        }
    }
    syncData();

    function toggleSettings() {
        const overlay = document.getElementById('settings-overlay');
        overlay.style.display = (overlay.style.display === 'flex') ? 'none' : 'flex';
    }

    function saveSettings() {
        const key = document.getElementById('apiKeyInput').value.trim();
        if (key) {
            localStorage.setItem('GEMINI_API_KEY', key);
            API_KEY = key;
            location.reload();
        }
    }

    async function callGemini() {
        if (!API_KEY) { toggleSettings(); return; }
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if (!text) return;

        addMsg(text, 'user');
        input.value = "";
        
        const loading = document.createElement('div');
        loading.className = 'msg ai';
        loading.innerText = "Gemini思考中...";
        document.getElementById('chat-window').appendChild(loading);

        const prompt = `あなたはAIセンター長（裏荒木）です。最新KPIデータ：\n${LIVE_DATA}\n\n報告：${text}`;

        // 最新のエンドポイント v1beta を使用
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }]
                })
            });

            const data = await response.json();

            if (data.error) {
                // エラーの詳細をそのまま表示させる
                loading.innerText = "執行拒絶: " + data.error.message + " (Code: " + data.error.code + ")";
                return;
            }

            const aiText = data.candidates[0].content.parts[0].text;
            loading.remove();
            addMsg(aiText, 'ai');
        } catch (error) {
            loading.innerText = "通信障害: ネットワークまたはURLを確認しろ。";
        }
        const win = document.getElementById('chat-window');
        win.scrollTop = win.scrollHeight;
    }

    function addMsg(text, side) {
        const win = document.getElementById('chat-window');
        const div = document.createElement('div');
        div.className = `msg ${side}`;
        div.innerText = text;
        win.appendChild(div);
        win.scrollTop = win.scrollHeight;
    }
</script>
</body>
</html>
