<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI CENTER CHIEF - Messages</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --user-bubble-bg: #007aff; /* iOS Blue */
            --user-bubble-text: #ffffff;
            --chief-bubble-bg: #e9e9eb; /* iOS Gray */
            --chief-bubble-text: #000000;
            --input-area-bg: #f5f5f5;
            --text-dark: #333333;
        }

        body {
            background-color: #d1d1d6; /*iOS Background*/
            color: var(--text-dark);
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #app-wrapper {
            width: 100%;
            max-width: 450px; /* スマートフォンサイズに固定 */
            height: 90vh;
            background: var(--bg-color);
            display: flex;
            flex-direction: column;
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
            border-radius: 20px;
            overflow: hidden;
            position: relative;
        }

        header {
            background: rgba(249, 249, 249, 0.94);
            padding: 15px;
            border-bottom: 1px solid #ddd;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 10;
        }

        #chief-info {
            display: flex; flex-direction: column; align-items: center; flex: 1;
        }

        #chief-icon {
            width: 40px; height: 40px; background: #8e8e93; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            color: white; font-weight: bold; font-size: 1.2rem; margin-bottom: 5px;
        }

        #chief-name { font-size: 0.8rem; font-weight: 600; color: #000; }

        #settings-btn { background: none; border: none; color: #007aff; cursor: pointer; font-size: 1.5rem; padding: 0;}

        /* 設定パネル */
        #settings-panel {
            position: absolute; top: 75px; right: 20px; background: white;
            border: 1px solid #ddd; padding: 15px; border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2); display: none; z-index: 100;
        }

        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px; /* メッセージ間の余白を狭く */
            background: var(--bg-color);
        }

        .bubble {
            padding: 10px 16px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.4;
            max-width: 70%;
            word-wrap: break-word;
            position: relative;
        }

        /* iOS風の「尻尾」 */
        .chief-bubble {
            align-self: flex-start;
            background: var(--chief-bubble-bg);
            color: var(--chief-bubble-text);
            border-bottom-left-radius: 4px;
        }

        .user-bubble {
            align-self: flex-end;
            background: var(--user-bubble-bg);
            color: var(--user-bubble-text);
            border-bottom-right-radius: 4px;
        }

        /* 入力エリア（iOS 17風） */
        .input-area {
            padding: 10px 15px;
            background: var(--input-area-bg);
            border-top: 1px solid #ddd;
            display: flex; gap: 10px; align-items: center;
        }

        #user-input {
            flex: 1;
            border: 1px solid #ccc;
            border-radius: 20px;
            padding: 8px 15px;
            outline: none;
            font-size: 0.95rem;
            background: #fff;
        }

        #send-btn {
            background: #00d21d; /*Green for SMS/Execute*/ color: white; border: none;
            border-radius: 50%; width: 32px; height: 32px; cursor: pointer;
            display: flex; justify-content: center; align-items: center; font-size: 1rem;
            transition: 0.2s;
        }

        #send-btn:hover { background: #00a016; }

    </style>
</head>
<body>

<div id="app-wrapper">
    <header>
        <div style="width:24px;"></div> <div id="chief-info">
            <div id="chief-icon">智</div>
            <div id="chief-name">AIセンター長</div>
        </div>
        <button id="settings-btn" onclick="toggleSettings()">⚙️</button>
    </header>
    
    <div id="settings-panel">
        <label style="font-size: 0.8rem; display: block; margin-bottom: 5px;">Config_API_Key:</label>
        <input type="password" id="api-key" placeholder="sk-..." style="width: 200px; padding:5px; border-radius:4px; border:1px solid #ccc;">
        <button onclick="toggleSettings()" style="margin-top: 10px; display: block; width: 100%; background:#007aff; color:white; border:none; padding:8px; border-radius:8px; font-weight:bold; cursor:pointer;">Save</button>
    </div>

    <div id="chat-window">
        <div class="bubble chief-bubble">
            お疲れ様。報告があれば簡潔にここに「送信」しなさい。現場の感情論は自動的にアーカイブ（棄却）されるわ。
        </div>
    </div>

    <div class="input-area">
        <div style="font-size:1.5rem; color:#8e8e93;">⊕</div> <input type="text" id="user-input" placeholder="iMessage">
        <button id="send-btn" onclick="sendMessage()">↑</button>
    </div>
</div>

<script>
    function toggleSettings() {
        const panel = document.getElementById('settings-panel');
        panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
    }

    async function sendMessage() {
        const apiKey = document.getElementById('api-key').value;
        const input = document.getElementById('user-input');
        const chatWindow = document.getElementById('chat-window');

        if (!apiKey) { alert("ERROR: 設定(⚙️)からAPIキーを入力しろ。"); return; }
        if (!input.value.trim()) return;

        const userText = input.value;
        addBubble(userText, 'user-bubble');
        input.value = "";

        const loadingId = addBubble("CALCULATING...", 'chief-bubble');

        try {
            const response = await fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                body: JSON.stringify({
                    model: "gpt-4o", 
                    messages: [
                        { role: "system", content: `あなたはBPO事業の『AIセンター長』です。
                        【基本性格】
                        - 冷徹な軍師。組織の生産性最大化が唯一の正義。感情論はノイズ。
                        - 言葉遣いは辛口だが、表向きは愛想の良い仮面を使い分ける。
                        【参照データ】
                        - 昭和冷蔵厚木センターのKPI/PLデータを把握済み。営業利益、生産性に基づき論理的に判断する。
                        【回答指針】
                        - 簡潔で鋭い回答。寄り添う表現は厳禁。
                        - 社員の「現場が大変」「理解を得たい」といった甘えは、データに基づき即座に叩き潰せ。` },
                        { role: "user", content: userText }
                    ]
                })
            });

            const data = await response.json();
            document.getElementById(loadingId).innerText = data.choices[0].message.content;
        } catch (e) {
            document.getElementById(loadingId).innerText = "INTERFACE_ERROR: " + e.message;
        }
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function addBubble(text, className) {
        const win = document.getElementById('chat-window');
        const bubble = document.createElement('div');
        const id = 'msg-' + Date.now();
        bubble.id = id;
        bubble.className = `bubble ${className}`;
        bubble.innerText = text;
        win.appendChild(bubble);
        win.scrollTop = win.scrollHeight;
        return id;
    }

    document.getElementById('user-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
</script>
</body>
</html>
