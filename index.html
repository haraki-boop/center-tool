<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>執行 OS v89.0</title>
    <style>
        :root { --p: #1a237e; --a: #ff1744; --bg: #f0f2f5; }
        * { box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; display: flex; height: 100dvh; flex-direction: column; overflow: hidden; }
        header { background: var(--p); color: white; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; z-index: 30; }
        #chat { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 88%; padding: 14px; border-radius: 18px; font-size: 0.95rem; line-height: 1.6; white-space: pre-wrap; word-wrap: break-word; }
        .ai { align-self: flex-start; background: white; border-left: 5px solid var(--a); box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .user { align-self: flex-end; background: var(--p); color: white; }
        .img-preview { max-width: 100%; border-radius: 8px; margin-top: 8px; border: 1px solid #ddd; }
        #panel { background: white; padding: 10px 15px env(safe-area-inset-bottom); border-top: 1px solid #ddd; }
        .input-row { display: flex; gap: 8px; align-items: center; }
        input[type="text"] { flex-grow: 1; padding: 12px; border: 1px solid #ccc; border-radius: 20px; font-size: 16px; outline: none; }
        input[type="text"].mem-active { border: 2px solid #2e7d32; background: #f1f8e9; }
        .action-btn { background: #eee; border: 1px solid #ccc; border-radius: 50%; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; font-size: 1.2rem; }
        #sendBtn { background: var(--p); color: white; border: none; width: 44px; height: 44px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .status-bar { background: #111; font-size: 0.65rem; padding: 4px 15px; color: #00ff00; display: flex; justify-content: space-between; }
        #file-indicator { position: absolute; top: -5px; right: -5px; background: var(--a); color: white; border-radius: 50%; width: 20px; height: 20px; font-size: 11px; display: none; align-items: center; justify-content: center; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div><strong>執行 OS v89.0</strong></div>
    <button style="background:none;border:none;color:white;font-size:1.4rem;" onclick="openSettings()">⚙️</button>
</header>
<div class="status-bar">
    <span id="mem-status">通常モード</span>
    <span id="data-count">Ready</span>
</div>

<div id="chat"></div>

<div id="panel">
    <input type="file" id="imgInput" accept="image/*" style="display:none;">
    <div class="input-row">
        <button class="action-btn" onclick="document.getElementById('imgInput').click()">📷<div id="file-indicator">!</div></button>
        <button id="memBtn" class="action-btn" onclick="toggleMemoryMode()">🧠</button>
        <input type="text" id="userInput" placeholder="報告を入力..." autocomplete="off">
        <button id="sendBtn" onclick="exec()">🚀</button>
    </div>
</div>

<script type="module">
    import OpenAI from "https://cdn.jsdelivr.net/npm/openai@4.28.0/+esm";
    const STORAGE_KEY = 'URAA_INTEGRATED_BRAIN';
    const API_KEY_STORE = 'URAA_API_KEY';

    let brain = JSON.parse(localStorage.getItem(STORAGE_KEY)) || { structuredData: [], soulMemory: [] };
    let chatHistory = [];
    let isMemoryMode = false;
    let selectedImageBase64 = null;

    const updateUI = () => {
        const sd = brain.structuredData || [];
        const sm = brain.soulMemory || [];
        document.getElementById('data-count').innerText = `数値: ${sd.length}件 / 魂: ${sm.length}件`;
    };
    updateUI();

    window.toggleMemoryMode = () => {
        isMemoryMode = !isMemoryMode;
        const btn = document.getElementById('memBtn');
        const status = document.getElementById('mem-status');
        const input = document.getElementById('userInput');
        btn.style.background = isMemoryMode ? "#2e7d32" : "#eee";
        btn.style.color = isMemoryMode ? "#fff" : "#000";
        status.innerText = isMemoryMode ? "魂の刻印モード：ON" : "通常モード";
        status.style.color = isMemoryMode ? "#ffeb3b" : "#00ff00";
        if (isMemoryMode) input.classList.add('mem-active'); else input.classList.remove('mem-active');
    };

    document.getElementById('imgInput').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const max = 1024;
                let w = img.width, h = img.height;
                if (w > max) { h *= max/w; w = max; }
                canvas.width = w; canvas.height = h;
                canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                selectedImageBase64 = canvas.toDataURL('image/jpeg', 0.6);
                document.getElementById('file-indicator').style.display = 'flex';
            };
            img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
    });

    window.exec = async () => {
        const i = document.getElementById('userInput');
        const text = i.value.trim();
        const KEY = localStorage.getItem(API_KEY_STORE);
        if (!KEY || (!text && !selectedImageBase64)) return;

        if (isMemoryMode && text) {
            brain.soulMemory.push(text);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(brain));
            updateUI(); toggleMemoryMode();
        }

        addMsg(text || "画像を解析せよ", 'user', selectedImageBase64);
        const currentImg = selectedImageBase64;
        selectedImageBase64 = null;
        i.value = "";
        document.getElementById('file-indicator').style.display = 'none';

        const loading = addMsg("分析中...", 'ai');
        try {
            const openai = new OpenAI({ apiKey: KEY, dangerouslyAllowBrowser: true });
            
            // Vision対応メッセージ構造の構築
            let userContent = [];
            if (text) userContent.push({ type: "text", text: text });
            if (currentImg) userContent.push({ type: "image_url", image_url: { url: currentImg, detail: "auto" } });

            const sysPrompt = `あなたはAIセンター長。主君のミッション：作業/売上生産性2%向上、事故削減。魂の直近指針：${JSON.stringify((brain.soulMemory || []).slice(-3))}`;

            const res = await openai.chat.completions.create({
                model: "gpt-4o",
                messages: [
                    { role: "system", content: sysPrompt },
                    ...chatHistory.slice(-4),
                    { role: "user", content: userContent }
                ],
                max_tokens: 1000
            });

            const reply = res.choices[0].message.content;
            loading.innerText = reply;
            chatHistory.push({ role: "user", content: text || "(画像解析)" });
            chatHistory.push({ role: "assistant", content: reply });
        } catch (e) {
            loading.innerText = "執行エラー。通信環境かAPIキーを確認してください。";
            console.error(e);
        }
    };

    window.openSettings = () => {
        const c = prompt("1:Key / 3:JSONインポート / 4:バックアップDL / 6:リセット");
        if (c === "1") {
            const v = prompt("Key", localStorage.getItem(API_KEY_STORE) || ""); 
            if (v) { localStorage.setItem(API_KEY_STORE, v); location.reload(); }
        } else if (c === "3") {
            const input = document.createElement('input');
            input.type = 'file'; input.accept = '.json';
            input.onchange = (e) => {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const imported = JSON.parse(ev.target.result);
                        let newBrain = { structuredData: imported.structuredData || [], soulMemory: imported.soulMemory || [] };
                        if (Array.isArray(imported)) newBrain.structuredData = imported;
                        localStorage.setItem(STORAGE_KEY, JSON.stringify(newBrain));
                        setTimeout(() => { alert("同期成功。"); location.reload(); }, 200);
                    } catch(err) { alert("形式不正。"); }
                };
                reader.readAsText(e.target.files[0]);
            };
            input.click();
        } else if (c === "4") {
            const blob = new Blob([JSON.stringify(brain, null, 2)], {type: 'application/json'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
            a.download = `BRAIN_FINAL_v89.json`; a.click();
        } else if (c === "6") {
            if(confirm("全消去？")) { localStorage.removeItem(STORAGE_KEY); location.reload(); }
        }
    };

    function addMsg(t, s, img = null) {
        const c = document.getElementById('chat');
        const m = document.createElement('div');
        m.className = `msg ${s}`; m.innerText = t;
        if (img) { const i = document.createElement('img'); i.src = img; i.className = 'img-preview'; m.appendChild(i); }
        c.appendChild(m); c.scrollTop = c.scrollHeight; return m;
    }
    document.getElementById('userInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') exec(); });
</script>
</body>
</html>
