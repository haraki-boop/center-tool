<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>昭和冷蔵DX推進サポート - AIセンター長</title>
    <style>
        :root {
            --primary-color: #003366; /* 落ち着いたネイビー */
            --bg-color: #f4f7f9;
            --user-msg: #e1f5fe;
            --ai-msg: #ffffff;
        }
        body {
            background-color: var(--bg-color);
            color: #333;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        header {
            background-color: var(--primary-color);
            color: white;
            padding: 15px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        #chat-container {
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .bubble {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 15px;
            font-size: 0.95rem;
            line-height: 1.5;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .ai { align-self: flex-start; background-color: var(--ai-msg); border: 1px solid #ddd; }
        .user { align-self: flex-end; background-color: var(--user-msg); }
        
        #quick-actions {
            padding: 10px 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            background: white;
            border-top: 1px solid #ddd;
        }
        .btn-action {
            background: #fff;
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-action:hover { background: var(--primary-color); color: white; }

        #input-area {
            display: flex;
            padding: 15px;
            background: white;
            gap: 10px;
        }
        input[type="text"] {
            flex-grow: 1;
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 10px;
            outline: none;
        }
        button#send {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

<header>
    <strong>昭和冷蔵DX推進サポート</strong>
</header>

<div id="chat-container">
    <div class="bubble ai">
        お疲れ様です。センター長の荒木です。<br>
        現場の課題や、システム・交渉の停滞について相談してください。最適な解決策を提示します。
    </div>
</div>

<div id="quick-actions">
    <button class="btn-action" onclick="ask('システム担当者から返信が来ない')">システム部からの返信待機</button>
    <button class="btn-action" onclick="ask('現場スタッフが変化を嫌がっている')">スタッフの教育・意識改革</button>
    <button class="btn-action" onclick="ask('損失コストを値上げ交渉に使いたい')">追走費281万の活用法</button>
    <button class="btn-action" onclick="ask('BBのアプリ導入を急ぎたい')">BB部門の先行導入</button>
</div>

<div id="input-area">
    <input type="text" id="userInput" placeholder="質問を入力してください...">
    <button id="send" onclick="execute()">送信</button>
</div>

<script>
    function addMessage(text, side) {
        const container = document.getElementById('chat-container');
        const bubble = document.createElement('div');
        bubble.className = `bubble ${side}`;
        bubble.innerHTML = text;
        container.appendChild(bubble);
        container.scrollTop = container.scrollHeight;
    }

    function ask(query) {
        addMessage(query, 'user');
        process(query);
    }

    function execute() {
        const input = document.getElementById('userInput');
        if (input.value.trim() === "") return;
        ask(input.value);
        input.value = "";
    }

    function process(text) {
        setTimeout(() => {
            let response = "その件については、まず客観的なデータを揃えましょう。具体的な状況を詳しく教えてください。";
            
            if(text.includes("システム") || text.includes("返信")) {
                response = "<strong>【回答】</strong> 小笠原様の多忙を考慮し、御社の改修工数を一切奪わない「BBデータ抜き取りスキーム」での先行稼働を提案してください。関係性を保ちつつ、既成事実を積み上げるのが最短ルートです。";
            } else if(text.includes("スタッフ") || text.includes("変化")) {
                response = "<strong>【回答】</strong> 感情的な反発には「メリット」で返します。機械化がスタッフを『ミスの責任』から解放することを説き、それでも困難な場合は配置の適正化を検討してください。";
            } else if(text.includes("281万") || text.includes("コスト")) {
                response = "<strong>【回答】</strong> 281万円の追走費は、御社のブランドを守るための『投資の遅れ』による損失です。これを共通の課題として提示し、DX化によるコスト削減をセットで値上げの受理へ繋げましょう。";
            } else if(text.includes("BB")) {
                response = "<strong>【回答】</strong> BBは改修なしでデータ取得が可能です。まずはここで『事故ゼロ』の成功事例を1ヶ月で作り、それを武器に汎用カテゴリーのバッチ改修を認めさせます。";
            }

            addMessage(response, 'ai');
        }, 600);
    }
</script>
</body>
</html>
