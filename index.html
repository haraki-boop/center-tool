<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIセンター長・るーむ</title>
    <style>
        :root {
            --primary-bg: #fdf6f9;
            --chat-bg: #ffffff;
            --accent-soft: #ff85a1; /* マイルドな軍師ピンク */
            --text-main: #5a5a5a;
            --bot-bubble: #fff0f5;
            --user-bubble: #e1f5fe;
        }

        body {
            background-color: var(--primary-bg);
            color: var(--text-main);
            font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #app-wrapper {
            width: 95%;
            max-width: 500px;
            height: 85vh;
            background: var(--chat-bg);
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 4px solid var(--accent-soft);
        }

        header {
            background: var(--accent-soft);
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 1.1rem;
        }

        #api-config {
            background: #fff9fa;
            padding: 10px;
            border-bottom: 1px solid #eee;
            font-size: 0.8rem;
            display: flex;
            gap: 5px;
        }

        input[type="password"] {
            flex: 1;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 5px;
        }

        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .bubble {
            padding: 12px 18px;
            border-radius: 20px;
            max-width: 80%;
            font-size: 0.95rem;
            line-height: 1.5;
            position: relative;
        }

        .chief-bubble {
            align-self: flex-start;
            background: var(--bot-bubble);
            border: 2px solid var(--accent-soft);
            color: #d81b60;
        }

        .chief-bubble::after {
            content: " 🧠 AIセンター長";
            display: block;
            font-size: 0.7rem;
            margin-top: 5px;
            opacity: 0.7;
        }

        .user-bubble {
            align-self: flex-end;
            background: var(--user-bubble);
            color: #0277bd;
        }

        .input-area {
            padding: 15px;
            background: #fff;
            display: flex;
            gap: 10px;
            border-top: 1px solid #eee;
        }

        input[type="text"] {
            flex: 1;
            border: 2px solid #eee;
            border-radius: 25px;
            padding: 10px 20px;
            outline: none;
        }

        button {
            background: var(--accent-soft);
            color: white;
            border: none;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div id="app-wrapper">
    <header>AIセンター長・相談るーむ</header>
    
    <div id="api-config">
        <span>キーを入力:</span>
        <input type="password" id="api-key" placeholder="sk-...">
    </div>

    <div id="chat-window">
        <div class="bubble chief-bubble">
            お疲れ様。何か「論理的な」悩みでもあるのかしら？話してみなさい。
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="メッセージを入力...">
        <button onclick="sendMessage()">▶</button>
    </div>
</div>

<script>
    async function sendMessage() {
        const apiKey = document.getElementById('api-key').value;
        const input = document.getElementById('user-input');
        const chatWindow = document.getElementById('chat-window');

        if (!apiKey) { alert("APIキーが入力されていないわ。"); return; }
        if (!input.value.trim()) return;

        // ユーザーの表示
        addBubble(input.value, 'user-bubble');
        const userText = input.value;
        input.value = "";

        // AIセンター長の「思考」中
        const loadingId = addBubble("解析中...", 'chief-bubble');

        try {
            const response = await fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                    model: "gpt-4", // または gpt-3.5-turbo
                    messages: [
                        { role: "system", content: "あなたは『AIセンター長』です。性格は冷徹な軍師。組織の目的を最優先し、感情より論理を重視します。ただし、表向きは愛想よく笑顔で接します。回答は、指示された哲学ソースに基づき、生産性最大化や属人化排除の観点から、wittyかつ辛口なアドバイスをしてください。甘えは許しません。" },
                        { role: "user", content: userText }
                    ]
                })
            });

            const data = await response.json();
            const aiText = data.choices[0].message.content;
            
            document.getElementById(loadingId).innerText = aiText;
        } catch (e) {
            document.getElementById(loadingId).innerText = "エラーが発生したわ。APIキーが正しいか、通信環境を確認しなさい。";
        }

        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function addBubble(text, className) {
        const win = document.getElementById('chat-window');
        const bubble = document.createElement('div');
        const id = 'msg-' + Date.now();
        bubble.id = id;
        bubble.className = `bubble ${className}`;
        bubble.innerText = text;
        win.appendChild(bubble);
        win.scrollTop = win.scrollHeight;
        return id;
    }
</script>
</body>
</html>
