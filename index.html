<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>統治OS v27.0</title>
    <style>
        :root { --primary: #1a1a1a; --accent: #ff1744; --bg: #000; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: #fff; margin: 0; display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }
        header { padding: 15px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        #chat { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 90%; padding: 12px; border-radius: 4px; font-size: 0.9rem; line-height: 1.6; }
        .ai { align-self: flex-start; background: #1a1a1a; border-left: 3px solid var(--accent); }
        .user { align-self: flex-end; background: #333; color: #fff; }
        #panel { background: #111; padding: 20px; border-top: 1px solid #333; display: flex; gap: 10px; }
        input { flex-grow: 1; background: #222; border: 1px solid #44; color: #fff; padding: 12px; outline: none; border-radius: 4px; }
        button { background: var(--accent); color: #fff; border: none; padding: 0 20px; cursor: pointer; font-weight: bold; }
        .loss { color: var(--accent); font-weight: bold; font-size: 0.8rem; }
    </style>
</head>
<body>

<header>
    <div><strong>執行OS v27.0</strong></div>
    <div class="loss">損失 ¥2,814,000</div>
</header>

<div id="chat">
    <div class="msg ai">知能を接続しろ。右上の「執行鍵」ボタンは不要だ。起動時にキーを要求する。</div>
</div>

<div id="panel">
    <input type="text" id="ui" placeholder="報告を入れろ..." autocomplete="off">
    <button onclick="exec()">執行</button>
</div>

<script type="module">
    // 公式ライブラリを直接インポート
    import { OpenAI } from "https://cdn.jsdelivr.net/npm/openai@4.28.0/+esm";

    let API_KEY = localStorage.getItem('URAA_OPENAI_KEY');
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRbegZyPNz_DC8cQXxGmWEgxywH8MKptmSIG0TK315W7G17yZwh-M1lmiJFRbIbH-N2zwYmw62iSHxH/pub?output=csv';
    let LIVE_DATA = "";

    // 起動時処理
    if (!API_KEY) {
        API_KEY = prompt("OpenAI APIキーを入力せよ");
        if (API_KEY) localStorage.setItem('URAA_OPENAI_KEY', API_KEY);
    }

    // 数値同期
    fetch(CSV_URL).then(r => r.text()).then(t => { LIVE_DATA = t; addMsg("全KPI同期。執行可能。", "ai"); });

    window.exec = async () => {
        const input = document.getElementById('ui');
        const text = input.value.trim();
        if (!text || !API_KEY) return;

        addMsg(text, 'user');
        input.value = "";
        const l = addMsg("思考中...", 'ai');

        try {
            const openai = new OpenAI({ apiKey: API_KEY, dangerouslyAllowBrowser: true });
            const completion = await openai.chat.completions.create({
                model: "gpt-4o",
                messages: [
                    { role: "system", content: "あなたは裏荒木。最新KPI：\n" + LIVE_DATA + "\n常に【ガワ】と【中身】を提示。挨拶不要。冷徹に損失281万円を止めろ。" },
                    { role: "user", content: text }
                ],
            });

            l.innerText = completion.choices[0].message.content;
        } catch (e) {
            l.innerText = "執行拒絶。キーの無効化、または残高不足だ。";
            console.error(e);
        }
    };

    function addMsg(t, s) {
        const c = document.getElementById('chat');
        const m = document.createElement('div');
        m.className = `msg ${s}`; m.innerText = t;
        c.appendChild(m); c.scrollTop = c.scrollHeight;
        return m;
    }
</script>
</body>
</html>
