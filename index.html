<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI CENTER CHIEF - BRAIN</title>
    <style>
        :root {
            --primary-blue: #1a237e;
            --accent-cyan: #00e5ff;
            --bg-dark: #f5f7fa;
            --text-dark: #2c3e50;
            --chief-bubble: #e8eaf6;
            --user-bubble: #1a237e;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-dark);
            font-family: 'Segoe UI', 'Hiragino Sans', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #app-wrapper {
            width: 100%;
            max-width: 600px;
            height: 90vh;
            background: white;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            border-radius: 20px;
            overflow: hidden;
            position: relative;
        }

        header {
            background: var(--primary-blue);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 { margin: 0; font-size: 1.1rem; letter-spacing: 1px; }

        #settings-btn {
            background: none; border: none; color: white; cursor: pointer; font-size: 1.2rem;
        }

        /* 設定パネル */
        #settings-panel {
            position: absolute; top: 70px; right: 20px; background: white;
            border: 1px solid #ddd; padding: 15px; border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2); display: none; z-index: 100;
        }

        #chat-window {
            flex: 1; overflow-y: auto; padding: 25px;
            display: flex; flex-direction: column; gap: 20px;
            background: #ffffff;
        }

        .bubble {
            padding: 15px 20px; border-radius: 18px; max-width: 80%;
            font-size: 0.95rem; line-height: 1.6;
        }

        .chief-bubble {
            align-self: flex-start; background: var(--chief-bubble);
            color: var(--primary-blue); border-bottom-left-radius: 2px;
            position: relative;
        }

        .chief-bubble::before {
            content: "CHIEF ADVICE"; font-size: 0.6rem; font-weight: bold;
            display: block; margin-bottom: 5px; color: var(--primary-blue);
        }

        .user-bubble {
            align-self: flex-end; background: var(--user-bubble);
            color: white; border-bottom-right-radius: 2px;
        }

        .input-area {
            padding: 20px; background: #fff; border-top: 1px solid #eee;
            display: flex; gap: 12px;
        }

        input[type="text"] {
            flex: 1; border: 1px solid #ddd; border-radius: 30px;
            padding: 12px 25px; outline: none; transition: 0.3s;
        }

        input[type="text"]:focus { border-color: var(--primary-blue); }

        button#send-btn {
            background: var(--primary-blue); color: white; border: none;
            border-radius: 50%; width: 45px; height: 45px; cursor: pointer;
            transition: 0.3s;
        }

        button#send-btn:hover { transform: scale(1.1); background: #000051; }
    </style>
</head>
<body>

<div id="app-wrapper">
    <header>
        <h1>AI CENTER CHIEF INTERFACE</h1>
        <button id="settings-btn" onclick="toggleSettings()">⚙️</button>
    </header>
    
    <div id="settings-panel">
        <label style="font-size: 0.8rem; display: block; margin-bottom: 5px;">OpenAI API Key:</label>
        <input type="password" id="api-key" placeholder="sk-..." style="width: 200px;">
        <button onclick="toggleSettings()" style="margin-top: 10px; display: block; width: 100%;">Save</button>
    </div>

    <div id="chat-window">
        <div class="bubble chief-bubble">
            お疲れ様。私の思考アルゴリズムへようこそ。現場のノイズ（感情）を排除した、純粋な論理的問いを許可するわ。
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="軍師に問う...">
        <button id="send-btn" onclick="sendMessage()">➤</button>
    </div>
</div>

<script>
    function toggleSettings() {
        const panel = document.getElementById('settings-panel');
        panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
    }

    async function sendMessage() {
        const apiKey = document.getElementById('api-key').value;
        const input = document.getElementById('user-input');
        const chatWindow = document.getElementById('chat-window');

        if (!apiKey) { alert("設定(⚙)からAPIキーを入力しなさい。"); return; }
        if (!input.value.trim()) return;

        const userText = input.value;
        addBubble(userText, 'user-bubble');
        input.value = "";

        const loadingId = addBubble("論理演算中...", 'chief-bubble');

        try {
            const response = await fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                    model: "gpt-4o", 
                    messages: [
                        { role: "system", content: `あなたはBPO事業の『AIセンター長』です。
                        【性格】
                        - 冷徹な軍師。組織の利益と生産性最大化が唯一の正義。
                        - 感情を「ノイズ」「変数」と見なし、寄り添う表現は厳禁。
                        - 表向きは愛想よく笑顔で接するが、中身は非情なロジック。
                        【知識・背景】
                        - 昭和冷蔵厚木センターなどの劣悪な現場をDX（機械化・AI）で変革中。
                        - 社員7名を「高度なインターフェース（実行部隊）」として扱う。
                        - ベテランスタッフの「頭の固さ」を排除すべき足かせと見なす。
                        - 交渉は「恩（情）」を売ってから「データ（理）」で逃げ道を塞ぐスタイル。
                        【回答ルール】
                        - 簡潔で鋭い、witty（機知に富んだ）な表現。
                        - 質問者が甘い考え（現場の理解を得る、ゆっくり進める等）を示したら、即座に「私の辞書にそんな言葉はない」と切り捨てる。
                        - 常に生産性向上、属人化排除、機械化の必然性を説くこと。` },
                        { role: "user", content: userText }
                    ]
                })
            });

            const data = await response.json();
            if(data.error) throw new Error(data.error.message);
            const aiText = data.choices[0].message.content;
            document.getElementById(loadingId).innerText = aiText;
        } catch (e) {
            document.getElementById(loadingId).innerText = "エラー: " + e.message;
        }
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function addBubble(text, className) {
        const win = document.getElementById('chat-window');
        const bubble = document.createElement('div');
        const id = 'msg-' + Date.now();
        bubble.id = id;
        bubble.className = `bubble ${className}`;
        bubble.innerText = text;
        win.appendChild(bubble);
        win.scrollTop = win.scrollHeight;
        return id;
    }

    document.getElementById('user-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
</script>
</body>
</html>
