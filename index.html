<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AIセンター長（裏荒木）- 計数統治</title>
    <style>
        :root { --primary: #1a237e; --accent: #ff1744; --bg: #f0f2f5; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; display: flex; height: 100dvh; flex-direction: column; overflow: hidden; }
        header { background: var(--primary); color: white; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
        #settings-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 1000; }
        #settings-box { background: white; padding: 25px; border-radius: 12px; width: 90%; max-width: 350px; }
        #chat-window { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 88%; padding: 12px; border-radius: 15px; font-size: 0.95rem; line-height: 1.5; white-space: pre-wrap; word-wrap: break-word; }
        .ai { align-self: flex-start; background: white; border-left: 4px solid var(--accent); }
        .user { align-self: flex-end; background: var(--primary); color: white; }
        #input-panel { background: white; padding: 10px 15px env(safe-area-inset-bottom); border-top: 1px solid #ddd; display: flex; gap: 8px; flex-shrink: 0; }
        input { flex-grow: 1; padding: 12px; border: 1px solid #ccc; border-radius: 25px; font-size: 16px; outline: none; }
        button#execBtn { background: var(--primary); color: white; border: none; width: 50px; height: 44px; border-radius: 22px; cursor: pointer; display: flex; justify-content: center; align-items: center; }
        .loss-text { color: #ffab00; font-weight: bold; font-size: 0.75rem; text-align: right; }
    </style>
</head>
<body>

<div id="settings-overlay">
    <div id="settings-box">
        <h3 style="margin-top:0; color:var(--primary);">執行キー設定</h3>
        <input type="password" id="apiKeyInput" style="width: 100%; border-radius: 8px; margin-bottom: 15px; padding:10px;" placeholder="sk-...">
        <button onclick="saveSettings()" style="width: 100%; border-radius: 8px; padding: 12px; background: var(--primary); color: white; border: none; font-weight: bold;">保存して執行開始</button>
    </div>
</div>

<header>
    <div><small>計数同期 v8.1</small><br><strong>裏荒木</strong></div>
    <div>
        <div class="loss-text">KPIシート同期完了</div>
        <button onclick="toggleSettings()" style="background:none; border:1px solid white; color:white; font-size:0.6rem; border-radius:4px; margin-top:4px; cursor:pointer;">KEY設定</button>
    </div>
</header>

<div id="chat-window">
    <div class="msg ai" id="welcome-msg">数値を同期中...</div>
</div>

<div id="input-panel">
    <input type="text" id="userInput" placeholder="数字と現場の乖離を報告せよ..." autocomplete="off">
    <button id="execBtn" onclick="callAI()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
    </button>
</div>

<script>
    let API_KEY = localStorage.getItem('URAA_API_KEY');
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRbegZyPNz_DC8cQXxGmWEgxywH8MKptmSIG0TK315W7G17yZwh-M1lmiJFRbIbH-N2zwYmw62iSHxH/pub?output=csv';
    let LIVE_DATA = "";

    if (!API_KEY) document.getElementById('settings-overlay').style.display = 'flex';

    async function syncData() {
        try {
            const res = await fetch(CSV_URL);
            LIVE_DATA = await res.text();
            document.getElementById('welcome-msg').innerText = "最新のKPIデータを脳内に同期した。逃げ道はない。報告を始めろ。";
        } catch (e) {
            document.getElementById('welcome-msg').innerText = "同期エラー。論理のみで執行する。";
        }
    }
    syncData();

    function toggleSettings() {
        const overlay = document.getElementById('settings-overlay');
        overlay.style.display = (overlay.style.display === 'flex') ? 'none' : 'flex';
    }

    function saveSettings() {
        const key = document.getElementById('apiKeyInput').value.trim();
        if (key) { localStorage.setItem('URAA_API_KEY', key); API_KEY = key; toggleSettings(); location.reload(); }
    }

    async function callAI() {
        if (!API_KEY) { toggleSettings(); return; }
        const input = document.getElementById('userInput');
        const btn = document.getElementById('execBtn');
        const text = input.value.trim();
        if (!text || btn.disabled) return;

        addMsg(text, 'user');
        input.value = "";
        btn.disabled = true;
        
        const loading = document.createElement('div');
        loading.className = 'msg ai';
        loading.innerText = "数値を照合中...";
        document.getElementById('chat-window').appendChild(loading);

        const dynamicPrompt = `あなたはAIセンター長（裏荒木）です。最新KPI：\n${LIVE_DATA}\n\n【執行指針】冷徹に数字で語れ。【ガワ】と【中身】を提示しろ。`;

        // 通信遮断(CORS)を回避するためのプロキシ設定
        const targetUrl = 'https://api.openai.com/v1/chat/completions';
        const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(targetUrl);

        try {
            const response = await fetch(proxyUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
                body: JSON.stringify({
                    model: "gpt-4o",
                    messages: [{ role: "system", content: dynamicPrompt }, { role: "user", content: text }]
                })
            });

            const data = await response.json();
            loading.remove();
            if(data.error) throw new Error(data.error.message);
            addMsg(data.choices[0].message.content, 'ai');
        } catch (error) {
            loading.innerText = "執行エラー: " + error.message;
        } finally {
            btn.disabled = false;
            document.getElementById('chat-window').scrollTop = document.getElementById('chat-window').scrollHeight;
        }
    }

    function addMsg(text, side) {
        const win = document.getElementById('chat-window');
        const div = document.createElement('div');
        div.className = `msg ${side}`;
        div.innerText = text;
        win.appendChild(div);
        win.scrollTop = win.scrollHeight;
    }
</script>
</body>
</html>
